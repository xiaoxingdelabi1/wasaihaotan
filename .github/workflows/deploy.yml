name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install tools
        run: npm install -g terser html-minifier-terser clean-css-cli
      
      - name: Create dist directory
        run: mkdir -p dist/js dist/css
      
      - name: Minify JS files
        run: |
          for file in js/*.js; do
            terser "$file" -o "dist/$file" --compress --mangle --comments false
          done
      
      - name: Minify CSS files
        run: |
          for file in css/*.css; do
            cleancss -o "dist/$file" "$file"
          done
      
      - name: Minify HTML
        run: |
          html-minifier-terser --collapse-whitespace --remove-comments --minify-js true --minify-css true -o dist/index.html index.html
          html-minifier-terser --collapse-whitespace --remove-comments --minify-js true --minify-css true -o dist/蛙噻！好摊.html "蛙噻！好摊.html"
      
      - name: Copy LICENSE
        run: cp LICENSE dist/
      
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
